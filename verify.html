<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Security Verification - VidPlays</title>
    <meta name="robots" content="noindex, nofollow">
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --primary: #38bdf8; --text: #f8fafc; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .ad-spot { width: 90%; max-width: 728px; min-height: 100px; margin: 15px auto; }
        .card { background: var(--card); padding: 30px; border-radius: 12px; border: 1px solid #334155; text-align: center; width: 90%; max-width: 400px; margin-top: 40px; }
        .verify-btn { background: var(--primary); color: #000; border: none; padding: 15px 40px; border-radius: 8px; font-size: 1rem; font-weight: 700; cursor: pointer; margin-top: 20px; transition: 0.2s; }
        .verify-btn:hover { opacity: 0.9; transform: scale(1.02); }
        .verify-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    </style>
</head>
<body>

    <div class="ad-spot">
        <!-- ADSTERRA BANNER 1 -->
    </div>

    <div class="card">
        <h2>Security Verification</h2>
        <p style="color:#94a3b8; font-size:0.9rem; margin-bottom:20px;">
            Please confirm you are a real user to continue.
        </p>
        <button class="verify-btn" id="verifyBtn" onclick="handleVerify()">
            Continue
        </button>
        <p id="error-msg" style="color:#ef4444; font-size:0.8rem; display:none; margin-top:10px;"></p>
    </div>

    <div class="ad-spot" style="min-height:250px;">
        <!-- ADSTERRA BANNER 2 -->
    </div>

    <script>
        // Get token from URL
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');
        
        // Anti-bot check
        const isBot = /bot|crawl|spider|headless|phantom/i.test(navigator.userAgent);
        
        // Require human interaction (mouse move)
        let humanReady = false;
        document.addEventListener('mousemove', () => { humanReady = true; }, { once: true });
        document.addEventListener('touchstart', () => { humanReady = true; }, { once: true });

        function handleVerify() {
            const errorMsg = document.getElementById('error-msg');
            const btn = document.getElementById('verifyBtn');
            
            // Validate token
            if (!token || token.length < 3) {
                errorMsg.textContent = 'Invalid link. Please try again.';
                errorMsg.style.display = 'block';
                return;
            }
            
            // Require mouse interaction
            if (!humanReady) {
                errorMsg.textContent = 'Please interact with the page first.';
                errorMsg.style.display = 'block';
                return;
            }
            
            // Disable button
            btn.disabled = true;
            btn.textContent = 'Verifying...';
            
            // Store verification in sessionStorage
            sessionStorage.setItem('vp_token', token);
            sessionStorage.setItem('vp_verified', Date.now());
            
            // Redirect after short delay
            setTimeout(() => {
                window.location.href = '/post.html';
            }, 800);
        }
    </script>
</body>
</html>
