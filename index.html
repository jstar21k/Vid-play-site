<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0f172a">
    <title>JSTAR Gateway</title>
    <style>
        :root {
            --bg: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --primary: #38bdf8;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --error: #ef4444;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            margin: 0; padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            display: flex; flex-direction: column;
            min-height: 100vh;
        }

        /* Layout Sections */
        .ad-section {
            width: 100%;
            display: flex; align-items: center; justify-content: center;
            padding: 10px;
            background: rgba(0,0,0,0.2);
            min-height: 150px; /* Space for Top Ads */
        }

        .main-content {
            flex: 1; /* This takes the middle space */
            display: flex; align-items: center; justify-content: center;
            padding: 20px;
        }

        /* Center Card */
        .card {
            width: 100%; max-width: 360px;
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 30px 20px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            text-align: center;
        }

        /* Adsterra Placeholder Boxes */
        .ad-box {
            width: 100%;
            border: 1px dashed #444;
            border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            color: #64748b; font-size: 12px;
            overflow: hidden;
        }

        /* Timer UI */
        #timer-text { font-size: 1.2rem; font-weight: 700; margin-bottom: 12px; }
        
        .progress-bar {
            width: 100%; height: 8px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px; margin-bottom: 25px;
            overflow: hidden;
        }
        #progress-fill {
            width: 100%; height: 100%;
            background: var(--primary);
            transition: width 1s linear;
        }

        /* Button */
        .btn {
            width: 100%; padding: 18px; border-radius: 16px; border: none;
            font-size: 1rem; font-weight: 800; text-transform: uppercase;
            transition: all 0.3s ease;
        }
        .btn-disabled { background: #334155; color: #64748b; }
        .btn-active { 
            background: var(--primary); color: #000; 
            box-shadow: 0 10px 20px rgba(56, 189, 248, 0.4);
            cursor: pointer;
        }

        #error-view { display: none; }
    </style>
</head>
<body>

    <!-- TOP AD SECTION -->
    <div class="ad-section">
        <div class="ad-box" style="height: 120px;">
            <!-- PASTE TOP AD SCRIPT HERE -->
            TOP ADVERTISEMENT
        </div>
    </div>

    <!-- MIDDLE TIMER SECTION -->
    <div class="main-content">
        <div id="main-view" class="card">
            <div id="timer-text">Initializing...</div>
            <div class="progress-bar">
                <div id="progress-fill"></div>
            </div>

            <button id="action-btn" class="btn btn-disabled" disabled>
                Waiting...
            </button>
        </div>

        <!-- Error View -->
        <div id="error-view" class="card">
            <h2 style="color:var(--error); margin:0;">Invalid Link</h2>
            <p style="color:var(--text-dim); margin: 10px 0;">Please get a new link from the bot.</p>
        </div>
    </div>

    <!-- BOTTOM AD SECTION -->
    <div class="ad-section">
        <div class="ad-box" style="height: 120px;">
            <!-- PASTE BOTTOM AD SCRIPT HERE -->
            BOTTOM ADVERTISEMENT
        </div>
    </div>

    <script>
        const BOT_USERNAME = 'JSTAR_P4N3L_bot'; 
        const WAIT_TIME = 15;

        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');

        const timerTxt = document.getElementById('timer-text');
        const progress = document.getElementById('progress-fill');
        const btn = document.getElementById('action-btn');

        if (!token) {
            document.getElementById('main-view').style.display = 'none';
            document.getElementById('error-view').style.display = 'block';
        } else {
            let timeLeft = WAIT_TIME;
            
            const countdown = setInterval(() => {
                timeLeft--;
                timerTxt.innerText = `Please wait ${timeLeft}s`;
                progress.style.width = (timeLeft / WAIT_TIME) * 100 + "%";

                if (timeLeft <= 0) {
                    clearInterval(countdown);
                    timerTxt.innerText = "Ready to proceed!";
                    progress.style.width = "0%";
                    btn.disabled = false;
                    btn.classList.replace('btn-disabled', 'btn-active');
                    btn.innerText = "Open Telegram Bot";
                    
                    btn.onclick = () => {
                        window.location.href = `https://t.me/${BOT_USERNAME}?start=${token}`;
                    };
                }
            }, 1000);
        }
    </script>
</body>
</html>
