<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0f172a">
    <title>JSTAR Video Gateway</title>
    <style>
        :root {
            --bg: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --primary: #38bdf8;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --error: #ef4444;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            margin: 0; padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg);
            background-image: radial-gradient(circle at top right, #1e293b, #0f172a);
            color: var(--text-main);
            display: flex; align-items: center; justify-content: center;
            min-height: 100vh;
        }

        .container { width: 90%; max-width: 400px; text-align: center; }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 30px 20px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        #ad-container {
            width: 100%; min-height: 250px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 12px; margin-bottom: 25px;
            display: flex; align-items: center; justify-content: center;
            border: 1px dashed rgba(255, 255, 255, 0.1);
        }

        #timer-text { font-size: 1.1rem; font-weight: 600; margin-bottom: 10px; }

        .progress-bar {
            width: 100%; height: 6px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px; margin-bottom: 20px;
            overflow: hidden;
        }

        #progress-fill {
            width: 100%; height: 100%;
            background: var(--primary);
            transition: width 1s linear;
        }

        .btn {
            width: 100%; padding: 16px; border-radius: 14px; border: none;
            font-size: 1rem; font-weight: 700; cursor: pointer;
            transition: all 0.3s ease; display: flex; align-items: center; justify-content: center; gap: 10px;
        }

        .btn-disabled { background: #334155; color: #64748b; cursor: not-allowed; }
        .btn-active { background: var(--primary); color: #000; box-shadow: 0 10px 15px rgba(56, 189, 248, 0.3); }

        #error-view { display: none; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div class="container">
        <div id="main-view" class="card">
            <div id="ad-container">
                <!-- PASTE YOUR ADSTERRA CODE HERE -->
                <span style="color: #475569;">ADVERTISEMENT</span>
            </div>

            <div id="timer-text">Please wait 15 seconds...</div>
            <div class="progress-bar">
                <div id="progress-fill"></div>
            </div>

            <button id="action-btn" class="btn btn-disabled" disabled>
                <span id="btn-text">Waiting...</span>
            </button>
        </div>

        <div id="error-view" class="card">
            <h2 style="color:var(--error)">Invalid Link</h2>
            <p style="color:var(--text-dim)">Please get a new link from the bot.</p>
        </div>
    </div>

    <script>
        // CONFIGURATION
        const BOT_USERNAME = 'JSTAR_P4N3L_bot'; 
        const WAIT_TIME = 15;

        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');

        if (!token) {
            document.getElementById('main-view').classList.add('hidden');
            document.getElementById('error-view').style.display = 'block';
        } else {
            let timeLeft = WAIT_TIME;
            const timerTxt = document.getElementById('timer-text');
            const progress = document.getElementById('progress-fill');
            const btn = document.getElementById('action-btn');
            const btnTxt = document.getElementById('btn-text');

            const countdown = setInterval(() => {
                timeLeft--;
                timerTxt.innerText = `Please wait ${timeLeft} seconds...`;
                progress.style.width = (timeLeft / WAIT_TIME) * 100 + "%";

                if (timeLeft <= 0) {
                    clearInterval(countdown);
                    timerTxt.innerText = "Link is ready!";
                    progress.style.width = "0%";
                    btn.disabled = false;
                    btn.classList.replace('btn-disabled', 'btn-active');
                    btnTxt.innerText = "Open Telegram Bot";
                    
                    btn.onclick = () => {
                        window.location.href = `https://t.me/${BOT_USERNAME}?start=${token}`;
                    };
                }
            }, 1000);
        }
    </script>
</body>
</html>
