<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0f172a">
    <title>VidPlays - Secure Link</title> 

    <!-- Paste Monetag/AdSense scripts here -->
    
    <style>
        :root {
            --bg: #0f172a;
            --card-bg: #1e293b;
            --primary: #38bdf8;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            margin: 0; padding: 0;
            font-family: -apple-system, system-ui, sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            min-height: 100vh;
        }

        /* Sabse Chota Card Design */
        .card {
            width: 90%; max-width: 290px;
            background: var(--card-bg);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px; padding: 15px;
            text-align: center; box-shadow: 0 8px 25px rgba(0, 0, 0, 0.5);
        }

        /* Top Small Timer */
        #timer-label {
            font-size: 0.75rem; color: var(--primary);
            margin-bottom: 4px; font-weight: bold;
        }

        .p-bar { width: 100%; height: 2px; background: #334155; border-radius: 2px; margin-bottom: 12px; overflow: hidden; }
        #p-fill { width: 0%; height: 100%; background: var(--primary); transition: width 1s linear; }

        input[type="text"] {
            width: 100%; padding: 8px; border-radius: 6px; border: 1px solid #334155;
            background: #0f172a; color: white; margin-bottom: 12px; font-size: 0.85rem;
        }

        .btn {
            width: 100%; padding: 10px; border-radius: 8px; border: none;
            font-size: 0.85rem; font-weight: 700; text-transform: uppercase;
            cursor: pointer; transition: 0.2s;
        }
        .btn-active { background: var(--primary); color: #000; }
        .btn-disabled { background: #334155; color: #64748b; }

        .captcha-box {
            background: rgba(0,0,0,0.2); border-radius: 6px;
            padding: 10px; margin-bottom: 10px; display: flex;
            align-items: center; gap: 8px; border: 1px solid #334155;
            justify-content: center;
        }

        footer { position: fixed; bottom: 10px; font-size: 0.65rem; color: #475569; }
        
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <!-- HOME VIEW (LINK GENERATOR) -->
    <div id="home-view" class="card hidden">
        <h4 style="margin: 0 0 10px 0; color:var(--primary);">Link Protector</h4>
        <input type="text" id="tool-input" placeholder="Paste link...">
        <button class="btn btn-active" onclick="generateToolLink()">Generate</button>
        <div id="tool-result" class="hidden" style="margin-top:10px;">
            <input type="text" id="tool-output" readonly onclick="this.select()">
        </div>
    </div>

    <!-- GATEWAY VIEW (TIMER) -->
    <div id="gateway-view" class="card hidden">
        
        <!-- Timer Top -->
        <div id="timer-label" class="hidden">Initializing...</div>
        <div id="p-bar-wrap" class="p-bar hidden">
            <div id="p-fill"></div>
        </div>

        <!-- Step 1: Captcha -->
        <div id="captcha-step">
            <h5 style="margin:0 0 8px 0; font-size:0.9rem;">Security Check</h5>
            <div class="captcha-box">
                <input type="checkbox" id="verify-check" style="width:16px; height:16px;" onclick="startFlow()">
                <span style="font-size:0.8rem;">I am not a robot</span>
            </div>
        </div>

        <!-- Step 2: Message -->
        <div id="wait-msg" class="hidden" style="margin: 10px 0;">
            <p style="font-size: 0.75rem; color: var(--text-dim);">Link is being generated, please wait.</p>
        </div>

        <!-- Step 3: Button -->
        <div id="final-step">
            <button id="action-btn" class="btn btn-disabled" disabled>Please Wait</button>
        </div>
    </div>

    <footer>&copy; 2024 VidPlays.in</footer>

    <script>
        const BOT_USERNAME = 'JSTAR_P4N3L_bot'; 
        const WAIT_TIME = 20; 
        const params = new URLSearchParams(window.location.search);
        const token = params.get('token');

        if (token) {
            document.getElementById('gateway-view').classList.remove('hidden');
        } else {
            document.getElementById('home-view').classList.remove('hidden');
        }

        // Generator
        function generateToolLink() {
            const input = document.getElementById('tool-input').value;
            if(!input) return;
            
            let finalToken;
            if(input.includes('start=')) {
                finalToken = input.split('start=')[1];
            } else {
                finalToken = "web_" + btoa(input); 
            }
            
            const final = window.location.origin + window.location.pathname + "?token=" + finalToken;
            document.getElementById('tool-output').value = final;
            document.getElementById('tool-result').classList.remove('hidden');
        }

        // Timer Flow
        function startFlow() {
            document.getElementById('captcha-step').classList.add('hidden');
            document.getElementById('timer-label').classList.remove('hidden');
            document.getElementById('p-bar-wrap').classList.remove('hidden');
            document.getElementById('wait-msg').classList.remove('hidden');
            
            let timeLeft = WAIT_TIME;
            const fill = document.getElementById('p-fill');
            const label = document.getElementById('timer-label');
            const btn = document.getElementById('action-btn');
            
            const timer = setInterval(() => {
                timeLeft--;
                label.innerText = `Link Ready in: ${timeLeft}s`;
                fill.style.width = ((WAIT_TIME - timeLeft) / WAIT_TIME * 100) + "%";

                if (timeLeft <= 0) {
                    clearInterval(timer);
                    label.innerText = "Link is Ready!";
                    document.getElementById('wait-msg').innerHTML = "<p style='color:var(--primary); font-size:0.75rem;'>Success! Click button below.</p>";
                    
                    btn.disabled = false;
                    btn.className = "btn btn-active";
                    btn.innerText = "Get Destination";
                    btn.onclick = () => {
                        if (token.startsWith('web_')) {
                            window.location.href = atob(token.replace('web_', ''));
                        } else {
                            window.location.href = `https://t.me/${BOT_USERNAME}?start=${token}`;
                        }
                    };
                }
            }, 1000);
        }
    </script>
</body>
</html>
