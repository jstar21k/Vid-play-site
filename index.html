<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0f172a">
    <title>Gateway - JSTAR</title>
    <style>
        :root {
            --bg: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.85);
            --primary: #38bdf8;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            margin: 0; padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            display: flex; flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* Large Ad Sections (Top & Bottom) */
        .ad-section {
            width: 100%;
            flex: 2; /* Occupies more screen space for ads */
            display: flex; align-items: center; justify-content: center;
            padding: 10px;
            background: rgba(0,0,0,0.2);
        }

        .ad-container {
            width: 100%; height: 100%;
            border: 1px dashed #334155;
            border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            color: #475569; font-size: 12px;
            text-align: center;
            overflow: hidden;
        }

        /* Small Middle Section (The Counter) */
        .main-content {
            flex: 1.2; /* Smaller middle area */
            display: flex; align-items: center; justify-content: center;
            padding: 10px;
            z-index: 10;
        }

        .card {
            width: 100%; max-width: 320px;
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 15px 20px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.6);
        }

        #timer-label { 
            font-size: 0.9rem; 
            font-weight: 700; 
            margin-bottom: 8px; 
            color: var(--primary);
            text-transform: uppercase;
        }
        
        .progress-wrapper {
            width: 100%; height: 5px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px; margin-bottom: 15px;
            overflow: hidden;
        }

        #progress-bar {
            width: 100%; height: 100%;
            background: var(--primary);
            transition: width 1s linear;
        }

        .btn {
            width: 100%; padding: 14px; border-radius: 12px; border: none;
            font-size: 0.95rem; font-weight: 800; text-transform: uppercase;
            letter-spacing: 1px; transition: 0.3s;
        }

        .btn-disabled { background: #1e293b; color: #475569; cursor: not-allowed; }
        
        .btn-active { 
            background: var(--primary); color: #000; 
            box-shadow: 0 4px 15px rgba(56, 189, 248, 0.4);
            cursor: pointer;
        }

        #error-view { display: none; color: #ef4444; font-weight: bold; font-size: 0.8rem; }
    </style>
</head>
<body>

    <!-- TOP AD SECTION -->
    <div class="ad-section">
        <div class="ad-container">
            <!-- PASTE TOP ADSTERRA SCRIPT HERE -->
            ADVERTISEMENT SPACE (TOP)
        </div>
    </div>

    <!-- MIDDLE COUNTER (SMALLER) -->
    <div class="main-content">
        <div id="status-card" class="card">
            <div id="timer-label">Checking Token...</div>
            
            <div class="progress-wrapper">
                <div id="progress-bar"></div>
            </div>

            <button id="action-btn" class="btn btn-disabled" disabled>
                Please Wait
            </button>

            <div id="error-view">❌ INVALID OR EXPIRED LINK</div>
        </div>
    </div>

    <!-- BOTTOM AD SECTION -->
    <div class="ad-section">
        <div class="ad-container">
            <!-- PASTE BOTTOM ADSTERRA SCRIPT HERE -->
            ADVERTISEMENT SPACE (BOTTOM)
        </div>
    </div>

    <script>
        /* --- BOT CONFIG --- */
        const BOT_USERNAME = 'Filebot69_bot'; 
        const WAIT_TIME = 15; 

        /* --- LOGIC --- */
        const params = new URLSearchParams(window.location.search);
        const token = params.get('token');
        
        const label = document.getElementById('timer-label');
        const progress = document.getElementById('progress-bar');
        const btn = document.getElementById('action-btn');
        const error = document.getElementById('error-view');

        // Verify Token exists
        if (!token || token.length < 3) {
            label.style.display = 'none';
            document.querySelector('.progress-wrapper').style.display = 'none';
            btn.style.display = 'none';
            error.style.display = 'block';
        } else {
            let timeLeft = WAIT_TIME;
            
            const countdown = setInterval(() => {
                timeLeft--;
                label.innerText = `Ready in ${timeLeft}s`;
                
                // Update Progress Bar
                const percent = (timeLeft / WAIT_TIME) * 100;
                progress.style.width = percent + "%";

                if (timeLeft <= 0) {
                    clearInterval(countdown);
                    label.innerText = "Link is Ready!";
                    progress.style.width = "0%";
                    
                    // Enable Button
                    btn.disabled = false;
                    btn.classList.remove('btn-disabled');
                    btn.classList.add('btn-active');
                    btn.innerText = "Get File Now";
                    
                    // Handle Click
                    btn.onclick = () => {
                        // Direct deep link redirect to Bot 1
                        window.location.href = `https://t.me/${BOT_USERNAME}?start=${token}`;
                    };
                }
            }, 1000);
        }
    </script>
</body>
</html>
