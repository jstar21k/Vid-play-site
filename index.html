<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0f172a">
    <title>JSTAR - Link Gateway</title>
    <style>
        :root {
            --bg: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.9);
            --primary: #38bdf8;
            --text-main: #f8fafc;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            margin: 0; padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            display: flex; flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* Large Ad Sections (Top & Bottom) */
        .ad-section {
            width: 100%;
            flex: 2.5; 
            display: flex; align-items: center; justify-content: center;
            padding: 10px;
            background: rgba(0,0,0,0.2);
        }

        .ad-box {
            width: 100%; height: 100%;
            border: 1px dashed #334155;
            border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            color: #475569; font-size: 12px; text-align: center;
            overflow: hidden;
        }

        /* Slim Middle Section */
        .main-content {
            flex: 1.2; 
            display: flex; align-items: center; justify-content: center;
            padding: 10px;
            z-index: 10;
        }

        .card {
            width: 100%; max-width: 320px;
            background: var(--card-bg);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 15px 20px;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.7);
        }

        #timer-text { 
            font-size: 0.9rem; font-weight: 700; 
            margin-bottom: 8px; color: var(--primary);
        }
        
        .progress-container {
            width: 100%; height: 5px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px; margin-bottom: 15px;
            overflow: hidden;
        }

        #progress-bar {
            width: 100%; height: 100%;
            background: var(--primary);
            transition: width 1s linear;
        }

        .btn {
            width: 100%; padding: 14px; border-radius: 12px; border: none;
            font-size: 0.9rem; font-weight: 900; text-transform: uppercase;
            letter-spacing: 1px; transition: 0.3s;
        }

        .btn-disabled { background: #1e293b; color: #475569; cursor: not-allowed; }
        
        .btn-active { 
            background: var(--primary); color: #000; 
            box-shadow: 0 4px 15px rgba(56, 189, 248, 0.4);
            cursor: pointer;
        }

        #error-view { display: none; color: #ef4444; font-weight: bold; font-size: 0.8rem; }
    </style>
</head>
<body>

    <!-- TOP AD AREA -->
    <div class="ad-section">
        <div class="ad-box">
            <!-- PASTE TOP ADSTERRA SCRIPT HERE -->
            ADVERTISEMENT TOP
        </div>
    </div>

    <!-- CENTER GATEWAY -->
    <div class="main-content">
        <div id="content-card" class="card">
            <div id="timer-text">Validating Link...</div>
            
            <div class="progress-container">
                <div id="progress-bar"></div>
            </div>

            <button id="main-btn" class="btn btn-disabled" disabled>
                Please Wait
            </button>

            <div id="error-view">❌ ERROR: INVALID TOKEN</div>
        </div>
    </div>

    <!-- BOTTOM AD AREA -->
    <div class="ad-section">
        <div class="ad-box">
            <!-- PASTE BOTTOM ADSTERRA SCRIPT HERE -->
            ADVERTISEMENT BOTTOM
        </div>
    </div>

    <script>
        /* CONFIG */
        const BOT_USERNAME = 'Filebot69_bot'; 
        const WAIT_SECONDS = 15;

        /* LOGIC */
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');
        
        const timerText = document.getElementById('timer-text');
        const progressBar = document.getElementById('progress-bar');
        const mainBtn = document.getElementById('main-btn');
        const errorView = document.getElementById('error-view');

        // Check if token exists
        if (!token) {
            timerText.style.display = 'none';
            document.querySelector('.progress-container').style.display = 'none';
            mainBtn.style.display = 'none';
            errorView.style.display = 'block';
        } else {
            let timeLeft = WAIT_SECONDS;
            
            const countdown = setInterval(() => {
                timeLeft--;
                timerText.innerText = `File ready in ${timeLeft}s`;
                
                // Update Progress Bar (Shrink)
                const width = (timeLeft / WAIT_SECONDS) * 100;
                progressBar.style.width = width + "%";

                if (timeLeft <= 0) {
                    clearInterval(countdown);
                    timerText.innerText = "Link Processed!";
                    progressBar.style.width = "0%";
                    
                    // Enable the "Get File Now" Button
                    mainBtn.disabled = false;
                    mainBtn.classList.replace('btn-disabled', 'btn-active');
                    mainBtn.innerText = "Get File Now";
                    
                    // HANDLE REDIRECT
                    mainBtn.onclick = () => {
                        // Deep link opens Telegram directly
                        const tgAppUrl = `tg://resolve?domain=${BOT_USERNAME}&start=${token}`;
                        const tgWebUrl = `https://t.me/${BOT_USERNAME}?start=${token}`;
                        
                        // Try opening App
                        window.location.href = tgAppUrl;
                        
                        // Fallback to Web link
                        setTimeout(() => {
                            window.location.href = tgWebUrl;
                        }, 600);
                        
                        mainBtn.innerText = "OPENING TELEGRAM...";
                    };
                }
            }, 1000);
        }
    </script>
</body>
</html>
